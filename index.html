<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Cielo & Ane 💖</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:ital,wght@0,400;0,600;0,700;0,800;1,600&family=Dancing+Script:wght@600;700&display=swap');

*{margin:0;padding:0;box-sizing:border-box;}

/* ═══════════════════════════════════════
   ROOT & BODY
═══════════════════════════════════════ */
:root{
  --pink-deep:#c2185b;
  --pink-main:#e91e8c;
  --pink-mid:#f06292;
  --pink-light:#f8bbd9;
  --pink-pale:#fce4ec;
  --pink-glow:rgba(233,30,140,0.6);
  --btn-face:#e8618c;
  --btn-shadow:#b0355f;
  --console-body:#f48fb1;
  --console-shadow:#c2185b;
  --screen-border:#ad1457;
  --joystick:#d81b60;
  --dpad:#b71c5c;
  --text-dark:#4a0020;
}

html,body{
  background: radial-gradient(ellipse at 30% 20%, #fce4ec 0%, #f8bbd9 30%, #f48fb1 60%, #e91e8c 100%);
  display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
  min-height:100vh;min-height:100dvh;
  font-family:'Nunito',sans-serif;
  overflow-x:hidden;
  overflow-y:auto;
  touch-action:pan-y;
  padding: 0;
  box-sizing: border-box;
}

/* Decorative background hearts */
body::before{
  content:'';
  position:fixed;top:0;left:0;width:100%;height:100%;
  background-image:
    radial-gradient(circle at 10% 20%, rgba(255,255,255,0.15) 0%, transparent 50%),
    radial-gradient(circle at 85% 75%, rgba(255,255,255,0.1) 0%, transparent 45%);
  pointer-events:none;z-index:0;
}

/* ═══════════════════════════════════════
   CONSOLE OUTER SHELL
═══════════════════════════════════════ */
#console{
  position:relative;
  z-index:1;
  width: 100%;
  max-width: 520px;
  background: linear-gradient(160deg, #f8bbd9 0%, #f06292 35%, #e91e8c 70%, #c2185b 100%);
  border-radius: 36px 36px 60px 60px;
  padding: 12px 12px 22px 12px;
  box-shadow:
    0 8px 0 var(--console-shadow),
    0 14px 40px rgba(173,20,87,0.55),
    0 2px 0 rgba(255,255,255,0.4) inset,
    0 -2px 0 rgba(0,0,0,0.15) inset;
  display:flex;flex-direction:column;align-items:center;gap:8px;
  user-select:none;
  -webkit-user-select:none;
  margin: 8px 0 16px 0;
  box-sizing: border-box;
}

/* Glossy top shine */
#console::before{
  content:'';
  position:absolute;top:0;left:8%;width:84%;height:45%;
  background:linear-gradient(180deg,rgba(255,255,255,0.28) 0%,transparent 100%);
  border-radius:36px 36px 60% 60%;
  pointer-events:none;
}

/* ── LOGO STRIP ── */
#consoleLogo{
  font-family:'Dancing Script',cursive;
  font-size:11px;font-weight:700;
  color:rgba(255,255,255,0.75);
  letter-spacing:3px;
  text-transform:uppercase;
  text-shadow:0 1px 3px rgba(0,0,0,0.3);
  margin-top:0;
}

/* ── SCREEN BEZEL ── */
#screenBezel{
  width:100%;
  background:linear-gradient(145deg, #ad1457, #880e4f, #6a0636);
  border-radius:16px;
  padding:8px;
  box-shadow:
    0 4px 16px rgba(0,0,0,0.5),
    0 1px 0 rgba(255,255,255,0.2) inset,
    0 -2px 0 rgba(0,0,0,0.3) inset;
  position:relative;
  flex-shrink: 0;
}

/* Tiny speaker dots top-left */
#screenBezel::before{
  content:'• • •';
  position:absolute;top:4px;left:12px;
  font-size:5px;letter-spacing:2px;
  color:rgba(255,255,255,0.35);
  font-family:monospace;
}
/* Camera dot */
#screenBezel::after{
  content:'';
  position:absolute;top:5px;right:14px;
  width:5px;height:5px;border-radius:50%;
  background:rgba(255,255,255,0.25);
  box-shadow:0 0 4px rgba(255,255,255,0.4);
}

/* ── GAME WRAPPER (canvas area) ── */
#gameWrapper{
  position:relative;
  width:100%;
  aspect-ratio:4/3;
  border-radius:8px;
  overflow:hidden;
  box-shadow: 0 0 0 2px rgba(0,0,0,0.4), 0 0 30px rgba(233,30,140,0.4);
}

canvas{display:block;width:100%;height:100%;}

#ui{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;}

/* ─────────────────────────────────
   NARRATIVE / DIALOG BOX  (Pokemon style - compact)
───────────────────────────────── */
#narrativeBox{
  position:absolute;
  bottom:0;left:0;right:0;
  background:linear-gradient(180deg,rgba(6,1,20,0.0) 0%,rgba(6,1,20,0.97) 8%,rgba(6,1,20,1.0) 100%);
  border-top:2px solid rgba(255,130,180,0.6);
  padding:8px 10px 12px;
  display:none;
  pointer-events:all;
  z-index:25;
  animation:slideUp 0.25s cubic-bezier(0.34,1.2,0.64,1);
}
@keyframes slideUp{from{transform:translateY(100%);opacity:0;}to{transform:translateY(0);opacity:1;}}

/* Pokemon-style dialog layout */
#narrativeInner{
  display:flex;
  align-items:flex-start;
  gap:10px;
}
#narrativePortrait{
  flex-shrink:0;
  width:80px;height:80px;
  border-radius:8px;
  border:2px solid rgba(255,150,200,0.9);
  overflow:hidden;
  background:radial-gradient(ellipse at 40% 30%,#1a2060,#060a20);
  position:relative;
  box-shadow:0 0 14px rgba(255,80,160,0.6),0 0 0 1px rgba(100,140,255,0.3);
}
#narrativePortrait canvas{width:100%;height:100%;}
#narrativeRight{
  flex:1;
  display:flex;
  flex-direction:column;
  gap:4px;
  min-width:0;
}

.narrator-tag{
  display:inline-flex;align-items:center;gap:4px;
  background:linear-gradient(135deg,var(--pink-main),var(--pink-deep));
  color:#fff;
  font-family:'Fredoka One',cursive;
  font-size:11px;letter-spacing:1px;
  padding:3px 10px;border-radius:20px;
  width:fit-content;
  box-shadow:0 2px 6px rgba(233,30,140,0.4);
}
#narrativeText{
  color:#f5e8f5;
  font-size:11px;
  line-height:1.65;
  font-weight:600;
  padding-right:28px;
}
#narrativeClose{
  position:absolute;
  bottom:10px;right:10px;
  width:26px;height:26px;
  background:rgba(255,100,160,0.25);
  border:1.5px solid rgba(255,150,200,0.6);
  border-radius:50%;
  color:rgba(255,200,230,0.95);
  font-size:11px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  pointer-events:all;
  transition:background .15s,transform .15s;
  -webkit-tap-highlight-color:transparent;
  font-family:sans-serif;
}
#narrativeClose:active{background:rgba(255,100,160,0.6);transform:scale(0.88);}

/* ─────────────────────────────────
   CINEMATIC OVERLAY
───────────────────────────────── */
#cinematicOverlay{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(4,0,14,0.97);
  display:none;align-items:center;justify-content:center;flex-direction:column;
  pointer-events:all;z-index:100;border-radius:10px;
  padding:20px;
}
#cinematicOverlay.active{display:flex;}
.cin-hearts{font-size:28px;margin-bottom:12px;animation:pulse 1.4s ease-in-out infinite;}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.18);}}
.cin-title{
  font-family:'Dancing Script',cursive;color:#ff80c0;
  font-size:clamp(22px,6vw,38px);text-align:center;
  margin-bottom:10px;text-shadow:0 0 30px rgba(255,100,180,0.9);
}
.cin-sub{
  color:#d8b8d0;font-size:clamp(11px,3vw,14px);
  text-align:center;line-height:1.9;max-width:420px;font-weight:600;white-space:pre-line;
}
.cin-btn{
  margin-top:20px;padding:12px 36px;
  background:linear-gradient(135deg,#ff3d7f,#c0005a);
  color:#fff;border:none;border-radius:50px;
  font-size:14px;font-family:'Nunito',sans-serif;font-weight:700;
  cursor:pointer;pointer-events:all;
  box-shadow:0 4px 20px rgba(255,60,120,0.55);
  -webkit-tap-highlight-color:transparent;
  transition:transform .15s;
}
.cin-btn:active{transform:scale(0.95);}
.stars-bg{position:absolute;top:0;left:0;width:100%;height:100%;overflow:hidden;pointer-events:none;}
.star{position:absolute;background:#fff;border-radius:50%;animation:twinkle 2s ease-in-out infinite;}
@keyframes twinkle{0%,100%{opacity:.1;}50%{opacity:.9;}}

/* ─────────────────────────────────
   PAUSE SCREEN
───────────────────────────────── */
#pauseScreen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:rgba(4,0,14,0.92);
  display:none;align-items:center;justify-content:center;flex-direction:column;gap:14px;
  pointer-events:all;z-index:80;backdrop-filter:blur(6px);border-radius:10px;
}
#pauseScreen.active{display:flex;}
#pauseScreen h2{font-family:'Fredoka One',cursive;color:#ff80c0;font-size:clamp(28px,7vw,38px);}
#pauseScreen button{
  padding:10px 32px;background:rgba(255,80,150,0.2);
  border:2px solid #ff80c0;color:#fff;border-radius:50px;
  font-size:14px;font-family:'Nunito',sans-serif;cursor:pointer;font-weight:700;
  -webkit-tap-highlight-color:transparent;
}

/* ─────────────────────────────────
   LEVEL BANNER
───────────────────────────────── */
#levelBanner{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  font-family:'Dancing Script',cursive;font-size:clamp(22px,5vw,34px);
  color:#fff;text-shadow:0 0 24px rgba(255,150,200,0.95);
  display:none;pointer-events:none;z-index:50;text-align:center;line-height:1.45;
}

/* ─────────────────────────────────
   FINAL SCREEN
───────────────────────────────── */
#finalScreen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  background:#000;display:none;align-items:center;justify-content:center;flex-direction:column;
  pointer-events:all;z-index:200;border-radius:10px;overflow:hidden;
}
#finalScreen.active{display:flex;}
#finalCanvas{position:absolute;top:0;left:0;width:100%;height:100%;}
#finalContent{
  position:relative;z-index:10;display:flex;flex-direction:column;align-items:center;
  padding:16px 18px;max-width:520px;width:100%;
}
.final-title{
  font-family:'Dancing Script',cursive;color:#ffbbdd;font-size:clamp(26px,6vw,36px);
  text-align:center;margin-bottom:6px;text-shadow:0 0 24px rgba(255,100,180,0.8);
  opacity:0;animation:fadeInSlow 1.2s ease 0.5s forwards;
}
.final-subtitle{
  color:#b090b0;font-size:10px;text-align:center;margin-bottom:16px;
  letter-spacing:1.5px;text-transform:uppercase;
  opacity:0;animation:fadeInSlow 1s ease 1.4s forwards;
}
.final-question{
  color:#fff;font-size:clamp(14px,3.5vw,18px);text-align:center;margin-bottom:20px;font-weight:700;
  opacity:0;animation:fadeInSlow 1s ease 2.2s forwards;
  text-shadow:0 0 16px rgba(255,150,200,0.5);
}
.final-btns{display:flex;gap:12px;opacity:0;animation:fadeInSlow 1s ease 3s forwards;flex-wrap:wrap;justify-content:center;}
@keyframes fadeInSlow{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
.final-btn{
  padding:12px 26px;border:none;border-radius:50px;font-size:14px;
  font-family:'Nunito',sans-serif;font-weight:700;cursor:pointer;
  -webkit-tap-highlight-color:transparent;transition:transform .15s;
}
.final-btn:active{transform:scale(0.95);}
.final-btn.yes{background:linear-gradient(135deg,#ff3d7f,#c0005a);color:#fff;box-shadow:0 4px 18px rgba(255,60,120,0.55);}
.final-btn.always{background:linear-gradient(135deg,#8833ff,#5500bb);color:#fff;box-shadow:0 4px 18px rgba(140,0,255,0.55);}
.final-btn.replay{background:linear-gradient(135deg,#e91e8c,#880e4f);color:#fff;box-shadow:0 4px 18px rgba(233,30,140,0.55);}
#replayBtn{display:none;margin-top:16px;opacity:0;}
#replayBtn.visible{display:block;animation:fadeInSlow 1s ease forwards;}
#finalResponse{
  color:#ffddee;font-size:14px;text-align:center;max-width:420px;line-height:1.85;
  margin-top:14px;display:none;font-weight:600;
  background:rgba(0,0,0,0.45);padding:12px 18px;border-radius:14px;
  border:1px solid rgba(255,150,200,0.28);
  animation:fadeInSlow 0.8s ease forwards;
}

/* ─────────────────────────────────
   MEETING SCREEN
───────────────────────────────── */
#meetingScreen{
  position:absolute;top:0;left:0;width:100%;height:100%;
  display:none;pointer-events:all;z-index:150;border-radius:10px;overflow:hidden;
}
#meetingScreen.active{display:block;}
#meetingCanvas{width:100%;height:100%;}

/* ═══════════════════════════════════════
   CONSOLE BOTTOM CONTROLS
═══════════════════════════════════════ */
#consoleControls{
  width:100%;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 4px;
  gap:4px;
}

/* ── D-PAD ── */
.dpad-wrap{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  grid-template-rows:repeat(3,1fr);
  gap:2px;
  width:clamp(90px, 27vw, 112px);
  height:clamp(90px, 27vw, 112px);
  flex-shrink:0;
}
.dpad-btn{
  background:linear-gradient(135deg,#ad1457,#880e4f);
  border:none;border-radius:7px;
  color:rgba(255,255,255,0.9);font-size:13px;
  display:flex;align-items:center;justify-content:center;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 3px 0 #6a0636, 0 1px 0 rgba(255,255,255,0.15) inset;
  transition:transform .08s,box-shadow .08s;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.dpad-btn.center{background:linear-gradient(135deg,#c2185b,#ad1457);cursor:default;}
.dpad-btn:active,.dpad-btn.pressed{transform:translateY(2px);box-shadow:0 1px 0 #6a0636;}
.dpad-btn.empty{background:transparent;box-shadow:none;pointer-events:none;}

/* ── CENTER CLUSTER (logo + select/start) ── */
.center-cluster{
  display:flex;flex-direction:column;align-items:center;gap:5px;
  flex:1;
}
.ss-btns{display:flex;gap:8px;}
.ss-btn{
  background:linear-gradient(135deg,#c2185b,#ad1457);
  border:none;border-radius:20px;
  color:rgba(255,255,255,0.8);
  font-size:7px;font-family:'Nunito',sans-serif;font-weight:700;
  letter-spacing:0.8px;text-transform:uppercase;
  padding:5px 10px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 2px 0 #6a0636,0 1px 0 rgba(255,255,255,0.15) inset;
  transition:transform .08s;
  touch-action:manipulation;
}
.ss-btn:active{transform:translateY(1px);box-shadow:0 1px 0 #6a0636;}
.ss-btn-replay{
  background:linear-gradient(135deg,#880e4f,#6a0636);
  font-size:6px;letter-spacing:0.5px;padding:3px 12px;
}
.console-brand{
  font-family:'Dancing Script',cursive;
  font-size:10px;font-weight:700;
  color:rgba(255,255,255,0.5);
  letter-spacing:1px;
}

/* ── ACTION BUTTONS ── */
.action-btns{
  display:grid;
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr;
  gap:5px;
  width:clamp(90px, 27vw, 112px);
  height:clamp(90px, 27vw, 112px);
  flex-shrink:0;
}
.act-btn{
  width:clamp(36px, 11vw, 48px);
  height:clamp(36px, 11vw, 48px);
  border:none;border-radius:50%;
  color:#fff;font-family:'Fredoka One',cursive;font-size:12px;
  cursor:pointer;
  -webkit-tap-highlight-color:transparent;
  box-shadow:0 4px 0 rgba(0,0,0,0.4),0 1px 0 rgba(255,255,255,0.2) inset;
  display:flex;align-items:center;justify-content:center;
  transition:transform .08s,box-shadow .08s;
  touch-action:manipulation;
  user-select:none;-webkit-user-select:none;
}
.act-btn:active,.act-btn.pressed{transform:translateY(3px);box-shadow:0 1px 0 rgba(0,0,0,0.35);}
.btn-x{background:linear-gradient(135deg,#1565c0,#0d47a1);grid-column:2;grid-row:1;}
.btn-y{background:linear-gradient(135deg,#558b2f,#33691e);grid-column:1;grid-row:2;}
.btn-a{background:linear-gradient(135deg,#c62828,#b71c1c);grid-column:2;grid-row:2;}
.btn-b{background:linear-gradient(135deg,#f57f17,#e65100);grid-column:1;grid-row:3;}

/* Action btns grid fix */
.action-btns{
  grid-template-areas:
    ". x"
    "y a"
    "b .";
  grid-template-columns:1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  width:clamp(90px, 27vw, 112px);
  height:clamp(108px, 33vw, 128px);
}
.btn-x{grid-area:x;}
.btn-y{grid-area:y;}
.btn-a{grid-area:a;}
.btn-b{grid-area:b;}

/* ── JOYSTICK BARS (decorative) ── */
.joysticks{display:flex;justify-content:space-between;width:100%;padding:0 10px;}
.joystick{
  width:clamp(34px, 9vw, 42px);
  height:clamp(34px, 9vw, 42px);
  border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f48fb1,#c2185b 60%,#880e4f);
  box-shadow:0 3px 0 #6a0636,0 1px 0 rgba(255,255,255,0.25) inset,0 0 0 3px rgba(0,0,0,0.2);
  position:relative;
  cursor:pointer;
  touch-action:manipulation;
  -webkit-tap-highlight-color:transparent;
}
.joystick::after{
  content:'';
  position:absolute;top:20%;left:20%;width:35%;height:35%;
  border-radius:50%;
  background:rgba(255,255,255,0.35);
}
/* Rainbow glow on joysticks */
.joystick-wrap{
  display:flex;align-items:center;justify-content:center;
  width:clamp(44px, 12vw, 54px);
  height:clamp(44px, 12vw, 54px);
  border-radius:50%;
  background:conic-gradient(
    #ff4081,#ff9800,#ffeb3b,#4caf50,#2196f3,#9c27b0,#ff4081
  );
  padding:3px;
  box-shadow:0 0 12px rgba(255,100,180,0.5);
}

/* ── BOTTOM EDGE screws ── */
.screws{
  display:flex;justify-content:space-between;
  width:100%;padding:0 20px;
  margin-top:-2px;
}
.screw{
  width:8px;height:8px;border-radius:50%;
  background:radial-gradient(circle at 35% 30%,#f8bbd9,#c2185b);
  box-shadow:0 1px 2px rgba(0,0,0,0.3);
}
</style>
</head>
<body>

<!-- ═══ CONSOLE SHELL ═══ -->
<div id="console">
  <div id="consoleLogo">✦ CIELO & ANE ✦</div>

  <!-- SCREEN BEZEL -->
  <div id="screenBezel">
    <div id="gameWrapper">
      <canvas id="gameCanvas" width="800" height="500"></canvas>
      <div id="ui">

        <!-- NARRATIVE / DIALOG -->
        <div id="narrativeBox">
          <div id="narrativeInner">
            <div id="narrativePortrait">
              <canvas id="portraitCanvas" width="80" height="80"></canvas>
            </div>
            <div id="narrativeRight">
              <div class="narrator-tag">✉ Ane</div>
              <div id="narrativeText"></div>
            </div>
          </div>
          <div id="narrativeClose" onclick="G.closeNarrative()">✕</div>
        </div>

        <div id="levelBanner"></div>

        <!-- CINEMATIC OVERLAY -->
        <div id="cinematicOverlay">
          <div class="stars-bg" id="starsBg"></div>
          <div class="cin-hearts">💖</div>
          <div class="cin-title" id="cinTitle">Cielo & Ane</div>
          <div class="cin-sub" id="cinSub"></div>
          <button class="cin-btn" id="cinBtn">Comenzar ✨</button>
        </div>

        <!-- PAUSE -->
        <div id="pauseScreen">
          <h2>⏸ Pausa</h2>
          <button onclick="G.togglePause()">Continuar ▶</button>
        </div>

        <!-- MEETING -->
        <div id="meetingScreen">
          <canvas id="meetingCanvas" width="800" height="500"></canvas>
        </div>

        <!-- FINAL -->
        <div id="finalScreen">
          <canvas id="finalCanvas" width="800" height="500"></canvas>
          <div id="finalContent">
            <div class="final-title">Cielo & Ane</div>
            <div class="final-subtitle">— diez niveles, una historia —</div>
            <div class="final-question">¿Quieres seguir esta historia conmigo? 💖</div>
            <div class="final-btns">
              <button class="final-btn yes" onclick="G.finalChoice('si')">Sí ❤️</button>
              <button class="final-btn always" onclick="G.finalChoice('siempre')">Siempre ❤️</button>
            </div>
            <div id="finalResponse"></div>
            <div id="replayBtn"><button class="final-btn replay" onclick="G.replayGame()">🔁 Volver a jugar</button></div>
          </div>
        </div>

      </div><!-- /ui -->
    </div><!-- /gameWrapper -->
  </div><!-- /screenBezel -->

  <!-- JOYSTICK ROW -->
  <div class="joysticks">
    <div class="joystick-wrap"><div class="joystick" id="jsLeft"></div></div>
    <div class="joystick-wrap"><div class="joystick" id="jsRight"></div></div>
  </div>

  <!-- MAIN CONTROLS -->
  <div id="consoleControls">
    <!-- D-PAD -->

// ── AUDIO ──────────────────────────────────────────────────
const AudioCtx=window.AudioContext||window.webkitAudioContext;
let audioCtx=null;
function initAudio(){if(!audioCtx)audioCtx=new AudioCtx();}
function playTone(freq,type,dur,vol=0.3,delay=0){
  if(!audioCtx)return;
  const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);
  o.type=type;o.frequency.value=freq;
  g.gain.setValueAtTime(0,audioCtx.currentTime+delay);
  g.gain.linearRampToValueAtTime(vol,audioCtx.currentTime+delay+0.01);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+delay+dur);
  o.start(audioCtx.currentTime+delay);o.stop(audioCtx.currentTime+delay+dur+0.05);
}
function playCoin(){initAudio();playTone(880,'sine',0.1,0.25);playTone(1320,'sine',0.1,0.25,0.1);}
function playJump(){
  initAudio();const o=audioCtx.createOscillator(),g=audioCtx.createGain();
  o.connect(g);g.connect(audioCtx.destination);o.type='square';
  o.frequency.setValueAtTime(200,audioCtx.currentTime);
  o.frequency.linearRampToValueAtTime(500,audioCtx.currentTime+0.15);
  g.gain.setValueAtTime(0.15,audioCtx.currentTime);
  g.gain.exponentialRampToValueAtTime(0.001,audioCtx.currentTime+0.2);
  o.start();o.stop(audioCtx.currentTime+0.22);
}
function playCardPickup(){initAudio();[523,659,784,1047].forEach((f,i)=>playTone(f,'sine',0.2,0.28,i*0.1));}
function playEnemyKill(){initAudio();playTone(200,'sawtooth',0.2,0.3);playTone(100,'sawtooth',0.15,0.2,0.15);}
function playDie(){initAudio();[400,300,200,100].forEach((f,i)=>playTone(f,'square',0.15,0.3,i*0.1));}
function playLevelComplete(){initAudio();[523,659,784,1047,1319].forEach((f,i)=>playTone(f,'sine',0.3,0.35,i*0.12));}
function playMeetingMusic(){

}
function playFinalMusic(){
  initAudio();
  [[261,329,392],[293,369,440],[246,311,392],[220,277,349]].forEach(([a,b,c],i)=>{
    playTone(a,'sine',1.8,0.1,i*2.0);
    playTone(b,'sine',1.8,0.07,i*2.0);
    playTone(c,'sine',1.8,0.06,i*2.0);
  });
}
let bgMusicNodes=[];
function startBgMusic(){
  initAudio();stopBgMusic();
  const notes=[261,329,392,329,261,329,523,392];
  let t=audioCtx.currentTime+0.1;
  const loop=()=>{
    notes.forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.connect(g);g.connect(audioCtx.destination);
      o.type='triangle';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*0.25);
      g.gain.linearRampToValueAtTime(0.055,t+i*0.25+0.02);
      g.gain.exponentialRampToValueAtTime(0.001,t+i*0.25+0.22);
      o.start(t+i*0.25);o.stop(t+i*0.25+0.25);
      bgMusicNodes.push(o);
    });
    t+=notes.length*0.25;
    if(bgMusicNodes.length<200)setTimeout(loop,notes.length*250-100);
  };
  loop();
}
function stopBgMusic(){bgMusicNodes.forEach(n=>{try{n.stop();}catch(e){}});bgMusicNodes=[];}

// ── NARRATIVES ─────────────────────────────────────────────
const NARRATIVES=[
  ["Todavía recuerdo el momento exacto en que apareciste. No fue dramático ni de película. Simplemente estabas ahí, y algo en mí supo de inmediato que eras diferente a todo lo que había conocido antes. No sé cómo explicarlo, pero lo sentí.","No sé si tú lo notaste, pero yo sí. Había algo en cómo hablabas, en cómo te reías, en cómo existías sin pedirle permiso a nadie, que me hizo querer quedarme cerca. Solo... cerca. Sin prisa. Sin pretextos.","No quería que se notara, así que hice lo que mejor sé hacer: escuchar. Y mientras te escuchaba, sin que te dieras cuenta, me estaba enamorando. Despacio. Sin anunciarlo. Sin pedirte permiso.","Ese fue el comienzo. No con fuegos artificiales, sino con algo más silencioso y mucho más profundo. Con la certeza de que, de alguna manera, ya te conocía desde antes de conocerte."],
  ["Las primeras veces que hablamos fueron cortas. Mensajes sencillos. Nada espectacular. Y sin embargo, cada notificación tuya me cambiaba el ritmo del día. Era ridículo, lo sabía. No me importó.","Me gustaba cómo escribías. El ritmo que tenías. Las cosas que elegías decir y también las que dejabas sin decir. Sentía que había un idioma propio entre nosotros, uno que se estaba inventando solo.","Empecé a guardar capturas. Párrafos enteros. Los relía cuando quería recordar que eso había sido real, que no me lo había inventado. Que tú también habías estado ahí, al otro lado.","Cada conversación me dejaba con ganas de la siguiente. No de manera desesperada, sino dulce. Como cuando lees un buen libro y lo cierras sabiendo que mañana puedes seguir."],
  ["La primera vez que me reí de verdad contigo, me sorprendí a mí misma. No era una risa educada ni forzada. Era de las que duelen en la panza y se te escapan sin permiso.","Había algo en tu humor que me desarmaba. No era que dijeras cosas brillantes, era que las decías en el momento exacto. Como si supieras exactamente cuándo yo necesitaba reírme.","Empecé a notar que el tiempo pasaba diferente cuando estabas. Las horas se hacían cortas. Las conversaciones no tenían fondo. Y yo no quería que terminaran.","Reírse juntos es una forma de quererse. No todo el mundo lo sabe. Tú y yo, sin haberlo planeado, estábamos aprendiendo eso."],
  ["Hubo días en que las cosas no estuvieron bien. Días en que yo estaba rara, o tú estabas lejos, o simplemente el mundo era demasiado y ninguno de los dos tenía palabras.","En esos momentos aprendí algo importante: que no hay que tenerlo todo resuelto para estar. Que a veces basta con no desaparecer. Y tú no desapareciste.","Yo tampoco. Y eso, con el tiempo, se convirtió en algo sólido entre nosotros. No porque todo haya sido perfecto, sino porque seguimos eligiéndonos incluso cuando era difícil.","Los vínculos reales no se construyen solo en los días buenos. Se construyen en los días donde uno podría haberse ido y se quedó de todas formas. Gracias por quedarte."],
  ["Recuerdo la primera vez que me dejé caer de verdad. Que no puse cara de que todo estaba bien. Que simplemente te dije: hoy no puedo.","Y tú no intentaste arreglarlo. No me diste un discurso ni una lista de soluciones. Solo dijiste: aquí estoy. Y eso fue exactamente lo que necesitaba.","Apoyar a alguien no siempre es darle respuestas. A veces es simplemente hacer que no se sienta sola en lo que sea que esté cargando. Tú se me enseñaste eso.","Y espero haberte dado lo mismo, aunque sea en parte. Espero que en algún momento, cuando lo necesitabas, yo también estuve."],
  ["Hay algo raro y bonito en cómo crecemos cuando estamos cerca de las personas que nos importan. No es que nos cambien, es que nos recuerdan quiénes podemos ser.","Contigo me permití cosas que no me había permitido antes. Decir lo que pensaba. Pedir lo que quería. Mostrar partes mías que no siempre son fáciles de ver.","Y tú no las usaste en mi contra. Las recibiste. Eso no es poca cosa. Eso es, de hecho, una de las cosas más valiosas que alguien puede hacer por otra persona.","Soy un poco diferente desde que te conozco. No mejor ni peor, solo más yo. Y eso, en parte, es tuyo."],
  ["La confianza no es algo que se declara. Es algo que se construye, despacito, con cada vez que alguien hace lo que dijo que iba a hacer.","Tú construiste la mía sin que yo te lo pidiera. Con cosas pequeñas. Con constancia. Con presencia. Con la forma en que aparecías justo cuando hacía falta.","Hay pocas personas en mi vida de las que puedo decir que confío sin reservas. Sin esa vocecita que dice 'ten cuidado'. Tú eres una de ellas.","No lo digo a la ligera. Lo digo porque me lo has ganado, poco a poco, sin esforzarte demasiado, que es la única manera en que la confianza real funciona."],
  ["No sé exactamente en qué momento dejé de preguntarme si esto era lo que creía que era. En algún punto, simplemente lo supe.","Te quiero. No de manera perfecta ni de película. De manera real, con todo lo que eso implica: los días buenos, los complicados, los que no sé cómo nombrarlo pero igual está.","No te quiero por lo que haces ni por cómo me tratas, aunque todo eso importa. Te quiero por algo más difícil de explicar. Por algo que no elegí pero tampoco cambiaría.","Esto no es el final de nada. Es el principio de algo que todavía estamos aprendiendo a construir juntas. Y me alegra que seas tú la que esté al otro lado."],
  ["A veces me detengo y pienso en todo lo que ha pasado desde la primera vez. Todo lo que hemos recorrido, sin que ninguna de las dos lo planeara del todo.","Pienso en todo lo que hemos vivido juntos y me resulta imposible elegir un solo momento. Porque todos importan. Todos suman. Todos son parte de algo que, visto desde aquí, se siente mucho más grande que cualquiera de sus partes.","Los momentos buenos, claro. Pero también los raros, los incómodos, los que no salieron como queríamos. Incluso esos, quizás especialmente esos, construyeron algo entre nosotros que no habría existido de otra manera.","Valió la pena cada momento. Absolutamente cada uno. Y si pudiera volver a empezar desde el principio, con toda la información que tengo ahora, volvería a elegirte. Sin dudar."],
  ["Si llegaste hasta aquí, Cielo, es porque no te rendiste. Eso no es menor. Dice algo de ti que yo ya sabía, pero que me alegra que este juego también te lo diga: eres más fuerte, más constante y más valiente de lo que a veces te das crédito.","Quería que vivieras esto porque a veces las palabras solas no bastan. Quería que sintieras, aunque sea una pequeña parte, todo lo que hay en mi cabeza y en mi corazón cuando pienso en ti. En nosotros. En lo que hemos construido.","No sé exactamente qué viene después. Nadie lo sabe. Pero sí sé que quiero que vengas tú. Con todo lo que eres, con tus días brillantes y los que no lo son tanto. Con tus dudas y tus certezas. Con todo.","Gracias por estar, Cielo. Gracias por avanzar. Gracias por ser la persona que hace que todo esto valga la pena. Quiero seguir escribiendo esta historia contigo, página a página, día a día. Sigue. Ya casi llegamos."]
];

const MC={
  canvas:null,ctx:null,phase:0,timer:0,fadeAlpha:0,

  init(){

  _loop(){
    if(!document.getElementById('meetingScreen').classList.contains('active'))return;

  update(){
    const t=this.timer;this.roseFloat=Math.sin(t*0.04)*4;
    if(this.phase===0){this.cieloX+=(this.aneX-75-this.cieloX)*0.028;if(t>130)this.phase=1;}
    if(this.phase===1){if(t%14===0)this.heartParticles.push({x:this.aneX+Math.random()*24-12,y:375,vx:(Math.random()-.5)*1.8,vy:-(1.8+Math.random()*2),life:90,size:12+Math.random()*16,char:Math.random()>.5?'❤':'🌹'});if(t>280)this.phase=2;}
    if(this.phase===2){this.doorOpen=Math.min(1,(t-280)/110);this.aneX+=(695-this.aneX)*0.014;this.cieloX+=(695-80-this.cieloX)*0.014;if(t>400)this.phase=3;}
    if(this.phase===3){this.fadeAlpha=Math.min(1,this.fadeAlpha+0.013);if(this.fadeAlpha>=1){document.getElementById('meetingScreen').classList.remove('active');G.showFinal();}}
    this.heartParticles=this.heartParticles.filter(p=>{p.x+=p.vx;p.y+=p.vy;p.vy*=0.97;p.life--;return p.life>0;});
  },
  draw(){
    const c=this.ctx;c.clearRect(0,0,800,500);
    const bg=c.createLinearGradient(0,0,0,500);bg.addColorStop(0,'#060118');bg.addColorStop(1,'#150830');c.fillStyle=bg;c.fillRect(0,0,800,500);
    for(let i=0;i<100;i++){const sx=(i*137)%800,sy=(i*79)%320;c.globalAlpha=(Math.sin(this.timer*0.05+i)*0.5+0.5)*0.75+0.1;c.fillStyle='#fff';c.fillRect(sx,sy,1.5,1.5);}c.globalAlpha=1;
    c.fillStyle='#12063a';c.fillRect(0,430,800,70);c.fillStyle='rgba(255,255,255,0.07)';c.fillRect(0,430,800,3);
    this._drawDoor(c,700,430);this._drawAne(c,this.aneX,382);
    this._drawCielo(c,this.cieloX,382);
    this.heartParticles.forEach(p=>{c.globalAlpha=p.life/90;c.font=`${p.size}px serif`;c.textAlign='center';c.fillStyle='#ff80bb';c.fillText(p.char,p.x,p.y);});c.globalAlpha=1;
    c.textAlign='center';const msgs=['Cielo avanza... y Ane la espera con las rosas.','Ane preparó algo especial para ella, guardado con amor.','Juntos, hacia lo que sigue. ❤'];
    const ph=Math.min(this.phase,2);const start=[0,130,280][ph];const alpha=Math.min(1,(this.timer-start)/25);
    c.globalAlpha=alpha;c.fillStyle='#ffbbdd';c.font='italic 600 16px Nunito,sans-serif';c.fillText(msgs[ph],400,58);c.globalAlpha=1;

  _drawDoor(c,x,gy){const dw=84,dh=115,dx=x-dw/2,dy=gy-dh;c.fillStyle='#2a0f55';c.fillRect(dx-14,dy-14,dw+28,dh+14);c.beginPath();c.arc(x,dy,dw/2+14,Math.PI,0);c.fill();c.save();c.shadowBlur=28;c.shadowColor='#bb88ff';c.strokeStyle='#bb88ff';c.lineWidth=2.5;c.strokeRect(dx-14,dy-14,dw+28,dh+14);c.restore();const lg=c.createRadialGradient(x,dy+dh/2,0,x,dy+dh/2,dw);lg.addColorStop(0,'rgba(240,190,255,0.92)');lg.addColorStop(1,'rgba(90,0,180,0.2)');c.fillStyle=lg;c.fillRect(dx,dy,dw,dh);c.beginPath();c.arc(x,dy,dw/2,Math.PI,0);c.fill();if(this.doorOpen<1){const pw=dw/2*(1-this.doorOpen);c.fillStyle='#1e0840';c.fillRect(dx,dy,pw,dh);c.fillRect(x+dw/2-pw,dy,pw,dh);}if(this.doorOpen>0.25){for(let i=0;i<5;i++){const sx=x+Math.cos(this.timer*0.09+i*1.2)*32*this.doorOpen;const sy=dy+dh/2+Math.sin(this.timer*0.07+i)*18*this.doorOpen-((this.timer*0.45)%55);c.globalAlpha=this.doorOpen*0.65;c.font='11px serif';c.textAlign='center';c.fillText('✦',sx,sy);}c.globalAlpha=1;}},
  _drawCielo(c,x,y){

const G={
  state:'intro',level:0,coins:0,lives:3,paused:false,
  dialogPaused:false,  // NEW: paused by dialog
  keys:{},cam:{x:0},player:null,platforms:[],coins_arr:[],
  enemies_arr:[],cards_arr:[],goalX:3100,
  particles:[],levelDef:null,prevTime:0,animFrame:null,groundY:430,

  init(){this.setupInput();this.showIntro();this.loop(0);},

  setupInput(){
    document.addEventListener('keydown',e=>{
      initAudio();this.keys[e.code]=true;
      if(e.code==='KeyP'||e.code==='Escape')this.togglePause();
      if(e.code==='Space'||e.code==='KeyW'||e.code==='ArrowUp')this.keys['Jump']=true;
      if(e.code==='KeyA'&&this.state==='cinematic'){const b=document.getElementById('cinBtn');if(b)b.click();}
      if(['Space','ArrowUp','ArrowLeft','ArrowRight'].includes(e.code))e.preventDefault();
    });
    document.addEventListener('keyup',e=>{
      this.keys[e.code]=false;
      if(e.code==='Space'||e.code==='KeyW'||e.code==='ArrowUp')this.keys['Jump']=false;
    });
    const hold=(el,key)=>{
      if(!el)return;
      el.addEventListener('touchstart',e=>{initAudio();this.keys[key]=true;e.preventDefault();},{passive:false});
      el.addEventListener('touchend',e=>{this.keys[key]=false;e.preventDefault();},{passive:false});
      el.addEventListener('touchcancel',()=>{this.keys[key]=false;},{passive:true});
      el.addEventListener('mousedown',()=>{initAudio();this.keys[key]=true;});
      el.addEventListener('mouseup',()=>{this.keys[key]=false;});
      el.addEventListener('mouseleave',()=>{this.keys[key]=false;});
    };
    hold(document.getElementById('btnLeft'),'ArrowLeft');
    hold(document.getElementById('btnRight'),'ArrowRight');
    hold(document.getElementById('btnUp'),'Jump');
    hold(document.getElementById('btnJump'),'Jump');
    hold(document.getElementById('btnA'),'Jump');

    // A button also advances level-complete screen
    const btnA=document.getElementById('btnA');
    if(btnA){
      btnA.addEventListener('touchstart',e=>{
        initAudio();
        if(this.state==='cinematic'){const b=document.getElementById('cinBtn');if(b)b.click();}
        e.preventDefault();
      },{passive:false});
      btnA.addEventListener('mousedown',()=>{
        if(this.state==='cinematic'){const b=document.getElementById('cinBtn');if(b)b.click();}
      });
    }

    // X button = close dialog
    const btnX=document.getElementById('btnX');
    if(btnX){
      const closeDialog=()=>{initAudio();if(this.dialogPaused)this.closeNarrative();};
      btnX.addEventListener('touchstart',e=>{closeDialog();e.preventDefault();},{passive:false});
      btnX.addEventListener('mousedown',()=>closeDialog());
    }

    // START = start game from intro OR toggle pause during gameplay
    const startBtn=document.getElementById('btnStart');
    if(startBtn){
      const doStart=()=>{
        initAudio();
        if(this.state==='intro'){
          const cinBtn=document.getElementById('cinBtn');
          if(cinBtn)cinBtn.click();
        } else {
          this.togglePause();
        }
      };
      startBtn.addEventListener('touchstart',e=>{doStart();e.preventDefault();},{passive:false});
      startBtn.addEventListener('mousedown',()=>doStart());
    }

    // REPLAY button
    const replayBtn=document.getElementById('btnReplay');
    if(replayBtn){
      const doReplay=()=>{initAudio();this.replayGame();};
      replayBtn.addEventListener('touchstart',e=>{doReplay();e.preventDefault();},{passive:false});
      replayBtn.addEventListener('mousedown',()=>doReplay());
    }

    // Keyboard: X key closes dialog
    document.addEventListener('keydown',e=>{
      if(e.code==='KeyX'&&this.dialogPaused)this.closeNarrative();
    });
  },

  togglePause(){
    if(this.dialogPaused)return; // can't pause while dialog open
    if(this.state!=='playing'&&this.state!=='paused')return;
    this.paused=!this.paused;this.state=this.paused?'paused':'playing';
    document.getElementById('pauseScreen').classList.toggle('active',this.paused);
  },

  showIntro(){
    this.state='intro';
    const ov=document.getElementById('cinematicOverlay');ov.classList.add('active');
    document.getElementById('cinTitle').textContent='Cielo & Ane';
    document.getElementById('cinSub').textContent='Un día, Ane decidió contarle todo a Cielo.\nNo con palabras simples...\nsino con una aventura.\n\nEsta es su historia. ❤️';
    document.getElementById('cinBtn').textContent='Comenzar ✨';
    document.getElementById('cinBtn').onclick=()=>{initAudio();ov.classList.remove('active');this.startLevel(0);};
    this.generateStars('starsBg');startBgMusic();
  },

  generateStars(id){
    const el=document.getElementById(id);if(!el)return;el.innerHTML='';
    for(let i=0;i<90;i++){
      const s=document.createElement('div');s.className='star';
      s.style.cssText=`width:${Math.random()*3+1}px;height:${Math.random()*3+1}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-delay:${Math.random()*2}s;animation-duration:${1.5+Math.random()*2}s;`;
      el.appendChild(s);
    }
  },

  startLevel(n){
    this.level=n;this.paused=false;this.dialogPaused=false;
    document.getElementById('pauseScreen').classList.remove('active');
    document.getElementById('narrativeBox').style.display='none';
    const def=buildLevel(n);this.levelDef=def;
    this.platforms=def.platforms;this.goalX=def.goalX;
    this.coins_arr=def.coins.map(c=>({...c,collected:false,anim:0}));
    this.enemies_arr=def.enemies.map(e=>({x:e.x,y:this.groundY-32,vx:e.type==='walk'?-1.2:-.8,vy:0,type:e.type,alive:true,w:28,h:32,dir:-1}));
    this.cards_arr=def.cards.map((c,i)=>({x:c.x,y:c.y||this.groundY-30,index:i,collected:false,anim:0}));
    this.particles=[];this.cam={x:0};
    this.player={x:60,y:this.groundY-48,vx:0,vy:0,w:32,h:48,onGround:false,dir:1,anim:0,animTimer:0,invincible:0,dead:false,deadTimer:0};
    this.state='playing';
    const banner=document.getElementById('levelBanner');
    banner.innerHTML=LEVEL_TITLES[n].replace('\n','<br>');banner.style.display='block';
    setTimeout(()=>{banner.style.display='none';},3000);
  },

  // ── NEW: showNarrative pauses the game ──
  showNarrative(text){
    const box=document.getElementById('narrativeBox');
    document.getElementById('narrativeText').textContent=text;
    box.style.display='block';
    this.dialogPaused=true;
    playCardPickup();
    const pc=document.getElementById('portraitCanvas');
    if(pc){
      const c=pc.getContext('2d');
      c.clearRect(0,0,80,80);
      // Dark starry background
      const bg=c.createRadialGradient(40,40,0,40,40,46);
      bg.addColorStop(0,'#1a2a7a');bg.addColorStop(0.7,'#0a1230');bg.addColorStop(1,'#030710');
      c.fillStyle=bg;c.fillRect(0,0,80,80);
      for(let i=0;i<16;i++){c.fillStyle=`rgba(255,255,255,${0.15+Math.random()*0.5})`;c.beginPath();c.arc(Math.random()*80,Math.random()*80,0.7,0,Math.PI*2);c.fill();}
      // Glow behind head
      const glow=c.createRadialGradient(40,48,0,40,48,30);
      glow.addColorStop(0,'rgba(100,140,255,0.22)');glow.addColorStop(1,'transparent');
      c.fillStyle=glow;c.fillRect(0,0,80,80);
      // Draw ONLY the face+crown of Ane, zoomed & centered
      this._drawPortraitFaceAne(c,40,50);
    }
    const tag=document.querySelector('.narrator-tag');
    if(tag)tag.innerHTML='👑 Ane';
  },

  // Portrait: ONLY face + crown of Ane, fills the 80×80 canvas nicely
  _drawPortraitFaceAne(c,cx,faceY){
    const x=cx, y=faceY;
    const R=17;

    // ── 1. NECK + COLLAR (drawn first, behind everything) ──
    c.fillStyle='#f0c5a0'; c.fillRect(x-6,y+R-2,12,14);
    c.fillStyle='#16163a'; c.fillRect(x-13,y+R+8,26,12);
    c.fillStyle='#ffd700'; c.fillRect(x-13,y+R+8,2,12); c.fillRect(x+11,y+R+8,2,12);

    // ── 2. HAIR BACK (behind face, sides and top) ──
    c.fillStyle='#0a1040';
    // Big back hair mass — wide arc behind head
    c.beginPath(); c.arc(x, y, R+5, Math.PI, 0); c.fill();
    // Left side sideburn/hair going down
    c.beginPath(); c.ellipse(x-R-3, y+6, 7, R*0.9, -0.1, 0, Math.PI*2); c.fill();
    // Right side
    c.beginPath(); c.ellipse(x+R+3, y+6, 7, R*0.9, 0.1, 0, Math.PI*2); c.fill();

    // ── 3. FACE SKIN ──
    c.fillStyle='#f0c5a0'; c.beginPath(); c.ellipse(x, y, R, R+1, 0, 0, Math.PI*2); c.fill();

    // ── 4. HAIR FRONT LAYER — covers top of face like a proper fringe ──
    c.fillStyle='#0a1040';
    // Main top hair shape — solid arc over forehead
    c.beginPath();
    c.moveTo(x-R-4, y-4);
    c.quadraticCurveTo(x-R, y-R-6, x, y-R-4);
    c.quadraticCurveTo(x+R, y-R-6, x+R+4, y-4);
    c.quadraticCurveTo(x+R+2, y-R+4, x+R-2, y-R+6);
    c.quadraticCurveTo(x, y-R+2, x-R+2, y-R+6);
    c.quadraticCurveTo(x-R-2, y-R+4, x-R-4, y-4);
    c.fill();
    // Fringe strands over forehead
    c.fillStyle='#0a1040';
    c.beginPath(); c.ellipse(x-7, y-R+3, 5, 7, -0.3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+2, y-R+1, 5, 8, 0.1, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+9, y-R+4, 4, 6, 0.4, 0, Math.PI*2); c.fill();
    // Hair highlight/shine
    c.fillStyle='rgba(70,100,200,0.2)';
    c.beginPath(); c.ellipse(x-4, y-R-2, 6, 3, -0.4, 0, Math.PI*2); c.fill();

    // ── 5. CROWN (on top of hair) ──
    c.save(); c.shadowBlur=12; c.shadowColor='#ffd700';
    const crownY = y - R - 7; // sits right on top of hair
    c.fillStyle='#ffd700';
    c.beginPath();
    c.moveTo(x-13, crownY+4);
    c.lineTo(x-9,  crownY-7);
    c.lineTo(x-4,  crownY-2);
    c.lineTo(x,    crownY-12);
    c.lineTo(x+4,  crownY-2);
    c.lineTo(x+9,  crownY-7);
    c.lineTo(x+13, crownY+4);
    c.closePath(); c.fill();
    // Crown base band
    c.fillStyle='#d4a000'; c.fillRect(x-13, crownY+1, 26, 5);
    // Crown center gem (bright yellow)
    c.fillStyle='#ffe44a'; c.beginPath(); c.arc(x, crownY-9, 3.5, 0, Math.PI*2); c.fill();
    c.fillStyle='rgba(255,255,255,0.8)'; c.beginPath(); c.arc(x-1, crownY-10, 1.5, 0, Math.PI*2); c.fill();
    // Side gems
    c.fillStyle='#2196f3'; c.beginPath(); c.arc(x-9, crownY+3, 2.5, 0, Math.PI*2); c.fill();
    c.fillStyle='#e53935'; c.beginPath(); c.arc(x+9, crownY+3, 2.5, 0, Math.PI*2); c.fill();
    c.restore();

    // ── 6. FACE DETAILS ──
    // Cheek blush
    c.fillStyle='rgba(220,140,110,0.25)';
    c.beginPath(); c.ellipse(x-R+5, y+5, 6, 4, 0, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+R-5, y+5, 6, 4, 0, 0, Math.PI*2); c.fill();

    // Eyebrows
    c.strokeStyle='#0a1040'; c.lineWidth=2; c.lineCap='round';
    c.beginPath(); c.moveTo(x-12,y-7); c.quadraticCurveTo(x-7,y-10,x-3,y-7); c.stroke();
    c.beginPath(); c.moveTo(x+12,y-7); c.quadraticCurveTo(x+7,y-10,x+3,y-7); c.stroke();

    // Eyes white
    c.fillStyle='#fff';
    c.beginPath(); c.ellipse(x-7, y-1, 4.5, 5.5, 0, 0, Math.PI*2); c.fill();
    c.beginPath(); c.ellipse(x+7, y-1, 4.5, 5.5, 0, 0, Math.PI*2); c.fill();
    // Iris (dark navy blue)
    c.fillStyle='#18205a';
    c.beginPath(); c.arc(x-7, y, 3, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(x+7, y, 3, 0, Math.PI*2); c.fill();
    // Pupil
    c.fillStyle='#05081a';
    c.beginPath(); c.arc(x-7, y, 1.4, 0, Math.PI*2); c.fill();
    c.beginPath(); c.arc(x+7, y, 1.4, 0, Math.PI*2); c.fill();
    // Shine
    c.fillStyle='#fff'; c.fillRect(x-8,y-2,2,2); c.fillRect(x+6,y-2,2,2);
    // Eyelashes top
    c.strokeStyle='#060c30'; c.lineWidth=1.4;
    c.beginPath(); c.arc(x-7,y-1,5.2,Math.PI+0.3,Math.PI*2-0.3); c.stroke();
    c.beginPath(); c.arc(x+7,y-1,5.2,Math.PI+0.3,Math.PI*2-0.3); c.stroke();

    // Nose
    c.strokeStyle='rgba(180,110,80,0.45)'; c.lineWidth=1; c.lineCap='round';
    c.beginPath(); c.arc(x, y+8, 2.5, 0.3, Math.PI-0.3); c.stroke();

    // Smile
    c.strokeStyle='#b07050'; c.lineWidth=1.7; c.lineCap='round';
    c.beginPath(); c.arc(x, y+12, 4.5, 0.25, Math.PI-0.25); c.stroke();
  },

  // ── NEW: closeNarrative resumes ──
  closeNarrative(){
    document.getElementById('narrativeBox').style.display='none';
    this.dialogPaused=false;  // RESUME
  },

  showLevelComplete(n){
    this.state='cinematic';this.dialogPaused=false;playLevelComplete();
    document.getElementById('narrativeBox').style.display='none';
    const ov=document.getElementById('cinematicOverlay');ov.classList.add('active');
    document.getElementById('cinTitle').textContent=`Nivel ${n+1} Completado 💖`;
    if(n+1>=10){
      document.getElementById('cinSub').textContent='Lo lograste, Cielo.\nHas llegado al final del camino...\n\nAlguien te espera. 💖';
      document.getElementById('cinBtn').textContent='Continuar →';
      document.getElementById('cinBtn').onclick=()=>{ov.classList.remove('active');MC.init();};
    } else {
      document.getElementById('cinSub').textContent=`"${NARRATIVES[n][3].slice(0,80)}..."\n\nSiguiente: ${LEVEL_TITLES_HUD[n+1]}`;
      document.getElementById('cinBtn').textContent='Continuar ▶';
      document.getElementById('cinBtn').onclick=()=>{ov.classList.remove('active');this.startLevel(n+1);};
    }
    this.generateStars('starsBg');
  },

  showGameOver(){
    this.state='cinematic';this.dialogPaused=false;playDie();
    document.getElementById('narrativeBox').style.display='none';
    const ov=document.getElementById('cinematicOverlay');ov.classList.add('active');
    document.getElementById('cinTitle').textContent='Game Over 💔';
    document.getElementById('cinSub').textContent='No te rindas, Cielo.\nAne te espera al final del camino.\n\nLo puedes lograr.';
    document.getElementById('cinBtn').textContent='Intentar de nuevo ❤️';
    document.getElementById('cinBtn').onclick=()=>{ov.classList.remove('active');this.lives=3;this.coins=0;this.startLevel(this.level);};
    this.generateStars('starsBg');
  },

  showFinal(){
    this.state='final';document.getElementById('finalScreen').classList.add('active');FC.init();
  },

  finalChoice(choice){
    const resp=document.getElementById('finalResponse');resp.style.display='block';
    if(choice==='si'){resp.innerHTML='"Sí"... Eso es todo lo que necesitaba escuchar.<br><br>Gracias por llegar hasta aquí, Cielo. Gracias por cada paso. Esta historia no termina aquí, apenas está encontrando su ritmo. Te quiero. ❤️';}
    else{resp.innerHTML='"Siempre"... Esa palabra lo contiene todo.<br><br>No necesito más. Contigo, para siempre, con todo lo que eso significa. Te quiero más de lo que imaginas, y eso tampoco va a cambiar. 💖';}
    playLevelComplete();setTimeout(()=>playCardPickup(),900);
    // Show replay button after a short delay
    setTimeout(()=>{
      const rb=document.getElementById('replayBtn');
      if(rb){rb.classList.add('visible');}
    }, 1800);
  },

  replayGame(){
    FC.stop();
    document.getElementById('finalScreen').classList.remove('active');
    document.getElementById('finalResponse').style.display='none';
    const rb=document.getElementById('replayBtn');
    if(rb){rb.classList.remove('visible');}
    this.lives=3;this.coins=0;
    this.showIntro();
  },

  loop(ts){
    const dt=Math.min((ts-(this.prevTime||ts))/16.67,3);
    this.prevTime=ts;this.update(dt);this.draw();
    this.animFrame=requestAnimationFrame(t=>this.loop(t));
  },

  update(dt){
    // PAUSE if dialog is open OR if paused
    if(this.state!=='playing'||this.paused||this.dialogPaused)return;
    this.updatePlayer(dt);this.updateEnemies(dt);
    this.checkCoins();this.checkCards();this.checkGoal();
    this.updateParticles(dt);this.updateCamera();
  },

  updatePlayer(dt){
    const p=this.player;
    if(p.dead){p.deadTimer-=dt;p.vy+=.4*dt;p.y+=p.vy*dt;if(p.deadTimer<=0){this.lives--;if(this.lives<=0)this.showGameOver();else this.startLevel(this.level);}return;}
    const spd=3.5;
    if(this.keys['ArrowLeft']||this.keys['KeyA']){p.vx=-spd;p.dir=-1;}
    else if(this.keys['ArrowRight']||this.keys['KeyD']){p.vx=spd;p.dir=1;}
    else p.vx*=.7;
    if((this.keys['Jump']||this.keys['ArrowUp']||this.keys['Space']||this.keys['KeyW'])&&p.onGround){p.vy=-11;p.onGround=false;playJump();}
    p.vy=Math.min(p.vy+.45*dt,15);p.x+=p.vx*dt;p.y+=p.vy*dt;
    if(p.x<0)p.x=0;p.onGround=false;
    if(p.y+p.h>=this.groundY){p.y=this.groundY-p.h;p.vy=0;p.onGround=true;}
    this.platforms.forEach(pl=>{if(p.x+p.w>pl.x&&p.x<pl.x+pl.w&&p.y+p.h>pl.y&&p.y+p.h<pl.y+24+p.vy+2&&p.vy>=0){p.y=pl.y-p.h;p.vy=0;p.onGround=true;}});
    if(p.y>H+50){p.dead=true;p.deadTimer=60;playDie();}
    if(p.invincible>0)p.invincible-=dt;
    p.animTimer+=dt;if(p.animTimer>8){p.animTimer=0;p.anim=(p.anim+1)%4;}
    if(p.invincible<=0){
      this.enemies_arr.forEach(en=>{if(!en.alive)return;if(rectsOverlap(p,en)){if(p.vy>0&&p.y+p.h<en.y+en.h*.5+8){en.alive=false;p.vy=-8;this.spawnParticles(en.x+14,en.y+16,8,'#ff8080');playEnemyKill();this.coins+=2;}else{p.invincible=90;p.vx=p.dir<0?4:-4;p.vy=-5;}}});
    }
  },

  updateEnemies(dt){
    this.enemies_arr.forEach(en=>{
      if(!en.alive)return;en.x+=en.vx*dt;
      if(en.type==='jump'){en.vy+=.35*dt;en.y+=en.vy*dt;if(en.y>=this.groundY-en.h){en.y=this.groundY-en.h;en.vy=-8;}this.platforms.forEach(pl=>{if(en.x+en.w>pl.x&&en.x<pl.x+pl.w&&en.y+en.h>=pl.y&&en.y+en.h<pl.y+30&&en.vy>=0){en.y=pl.y-en.h;en.vy=-8;}});}
      else{if(en.y<this.groundY-en.h){en.vy+=.45*dt;en.y+=en.vy*dt;}if(en.y>=this.groundY-en.h){en.y=this.groundY-en.h;en.vy=0;}}
      if(en.x<0){en.x=0;en.vx*=-1;}if(en.x<10||en.x>this.goalX-50){en.vx*=-1;en.dir=en.vx>0?1:-1;}
    });
  },

  checkCoins(){const p=this.player;this.coins_arr.forEach(c=>{if(c.collected)return;c.anim+=.1;if(rectsOverlap(p,{x:c.x,y:c.y,w:20,h:20})){c.collected=true;this.coins++;this.spawnParticles(c.x+10,c.y+10,6,'#ffd700');playCoin();}});},

  checkCards(){
    const p=this.player;
    this.cards_arr.forEach(c=>{
      if(c.collected)return;c.anim+=.05;
      if(rectsOverlap(p,{x:c.x-15,y:c.y-15,w:50,h:50})){
        c.collected=true;
        this.showNarrative(NARRATIVES[this.level][c.index]);
        this.spawnParticles(c.x+10,c.y+10,14,'#ff80c0');
      }
    });
  },

  checkGoal(){const p=this.player;if(p.x+p.w>this.goalX&&p.x<this.goalX+40&&p.y+p.h>this.groundY-80)this.showLevelComplete(this.level);},

  updateParticles(dt){this.particles=this.particles.filter(p=>{p.x+=p.vx*dt;p.y+=p.vy*dt;p.vy+=.2*dt;p.life-=dt;return p.life>0;});},
  spawnParticles(x,y,n,color){for(let i=0;i<n;i++){const a=Math.random()*Math.PI*2,sp=2+Math.random()*3;this.particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp-2,life:30+Math.random()*20,color,size:3+Math.random()*4});}},
  updateCamera(){const t=this.player.x-W*.35;this.cam.x+=(t-this.cam.x)*.1;this.cam.x=Math.max(0,this.cam.x);},

  draw(){
    ctx.clearRect(0,0,W,H);
    if(this.state==='playing'||this.state==='paused'){
      this.drawBg();ctx.save();ctx.translate(-this.cam.x,0);
      this.drawPlatforms();this.drawCoins();this.drawCards();
      if(this.level<9)this.drawGoal();else this.drawGoalLevel10();
      this.drawEnemies();this.drawPlayer();this.drawParticles();
      ctx.restore();this.drawHUD();
    }
  },

  drawBg(){
    const def=this.levelDef;if(!def)return;
    const lv=this.level,t=Date.now()*.001;
    const cx=this.cam.x;

    // Sky gradient
    const g=ctx.createLinearGradient(0,0,0,H);
    g.addColorStop(0,def.bgTop);g.addColorStop(1,def.bgBot);
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);

    // ── Level-specific background layers ──
    if(lv===0){
      // Meadow morning: clouds, distant hills, flowers
      this._bgClouds(cx,t,['#fff','#f8f8ff'],0.25,4);
      this._bgHills(cx,['#a8d5a2','#7ec87e'],0.15,this.groundY-20,80);
      this._bgFlowers(cx,t,this.groundY,['#ff80ab','#ffb3c6','#fff176']);
    } else if(lv===1){
      // Night city: stars, moon, distant glowing windows
      this._bgStars(cx,t,70,0.4);
      this._bgMoon(cx,t);
      this._bgCityline(cx,this.groundY);
    } else if(lv===2){
      // Sunrise/clouds: warm clouds, birds, sun rays
      this._bgSunRays(cx,t,def.bgTop);
      this._bgClouds(cx,t,['#fff4e0','#ffe0b2'],0.2,3);
      this._bgBirds(cx,t);
    } else if(lv===3){
      // Dark fire: ember particles, glowing cracks, volcanoes
      this._bgEmbers(cx,t);
      this._bgVolcanoes(cx,this.groundY);
    } else if(lv===4){
      // Cherry blossom park: trees, petals
      this._bgClouds(cx,t,['#ffe4ec','#ffc8d8'],0.18,3);
      this._bgCherryTrees(cx,t,this.groundY);
      this._bgPetals(cx,t);
    } else if(lv===5){
      // Golden sunset: sun, warm clouds
      this._bgSunset(cx,t);
      this._bgClouds(cx,t,['#ffccaa','#ff9966'],0.15,3);
    } else if(lv===6){
      // Deep night galaxy: stars, nebula, aurora
      this._bgNebula(cx,t);
      this._bgStars(cx,t,100,0.6);
      this._bgAurora(cx,t);
    } else if(lv===7){
      // Crystal cave: glowing crystals bg, mist
      this._bgCrystals(cx,t);
      this._bgMist(cx,t);
    } else if(lv===8){
      // Magic garden night: glowing flowers, fireflies
      this._bgNightGarden(cx,t,this.groundY);
      this._bgFireflies(cx,t);
    } else if(lv===9){
      // Final level: starfield + rainbow aura + roses
      this._bgStars(cx,t,120,0.8);
      this._bgRainbowAura(cx,t);
      this._bgRoseBorder(cx,t,this.groundY);
    }

    // Ground
    const gd=ctx.createLinearGradient(0,this.groundY,0,H);
    gd.addColorStop(0,def.ground);gd.addColorStop(1,this._darken(def.ground,0.5));
    ctx.fillStyle=gd;ctx.fillRect(-cx,this.groundY,W+cx+400,H-this.groundY);
    // Ground shine
    ctx.fillStyle='rgba(255,255,255,0.1)';ctx.fillRect(-cx,this.groundY,W+cx+400,3);
    // Ground detail texture
    ctx.fillStyle='rgba(0,0,0,0.08)';
    for(let gx2=Math.floor(cx/40)*40;gx2<cx+W+40;gx2+=40){
      ctx.fillRect(gx2-cx,this.groundY,1,H-this.groundY);
    }
  },

  _darken(hex,amt){
    let r=parseInt(hex.slice(1,3),16),g=parseInt(hex.slice(3,5),16),b=parseInt(hex.slice(5,7),16);
    return `rgb(${Math.floor(r*amt)},${Math.floor(g*amt)},${Math.floor(b*amt)})`;
  },

  _bgClouds(cx,t,colors,speed,count){
    for(let i=0;i<count;i++){
      const bx=((i*340-cx*speed+t*18)%1400)-200;
      const by=40+i*35;
      const sc=0.7+i*0.15;
      ctx.save();ctx.globalAlpha=0.82;
      ctx.fillStyle=colors[i%colors.length];
      this._cloud(bx,by,sc);
      ctx.restore();
    }
  },
  _cloud(x,y,s){
    ctx.beginPath();ctx.arc(x,y,28*s,0,Math.PI*2);ctx.arc(x+22*s,y-10*s,20*s,0,Math.PI*2);ctx.arc(x+42*s,y,22*s,0,Math.PI*2);ctx.arc(x+20*s,y+8*s,18*s,0,Math.PI*2);ctx.fill();
  },
  _bgHills(cx,colors,speed,baseY,h){
    colors.forEach((c,i)=>{
      ctx.fillStyle=c;ctx.beginPath();ctx.moveTo(0,baseY);
      for(let x=0;x<=W+20;x+=20){
        const wx=(x+cx*(speed+i*.05))*.012;
        ctx.lineTo(x,baseY-h*(0.5+0.5*Math.sin(wx+i*2)));
      }
      ctx.lineTo(W,baseY);ctx.closePath();ctx.fill();
    });
  },
  _bgFlowers(cx,t,groundY,colors){
    for(let i=0;i<18;i++){
      const fx=(i*173+Math.floor(i/3)*50)%3000;
      const sx=fx-cx*.4;if(sx<-20||sx>W+20)continue;
      const fy=groundY-4;
      ctx.fillStyle='#4caf50';ctx.fillRect(sx,fy-14,2,14);
      ctx.fillStyle=colors[i%colors.length];
      ctx.beginPath();ctx.arc(sx+1,fy-16,5,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#fff9c4';ctx.beginPath();ctx.arc(sx+1,fy-16,2,0,Math.PI*2);ctx.fill();
    }
  },
  _bgStars(cx,t,count,alpha){
    for(let i=0;i<count;i++){
      const sx=(i*137+i*i*.5)%W;const sy=(i*79)%(this.groundY-60);
      const tw=Math.sin(t*(0.5+i*.03)+i)*0.5+0.5;
      ctx.globalAlpha=tw*alpha;ctx.fillStyle='#fff';
      ctx.beginPath();ctx.arc(sx,sy,.8+tw*1.2,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  },
  _bgMoon(cx,t){
    ctx.save();ctx.shadowBlur=30;ctx.shadowColor='#ffffaa';
    ctx.fillStyle='#fffde7';ctx.beginPath();ctx.arc(W-80,60,28,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#f5f0c0';ctx.beginPath();ctx.arc(W-70,55,22,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='rgba(30,0,60,0.9)';ctx.beginPath();ctx.arc(W-60,55,20,0,Math.PI*2);ctx.fill();
    ctx.restore();
  },
  _bgCityline(cx,groundY){
    const buildings=[[50,120,60],[140,80,50],[220,140,45],[320,100,55],[420,160,40],[530,110,50],[650,90,60],[750,130,50],[880,150,55],[1020,100,60],[1150,120,45]];
    buildings.forEach(([bx,bh,bw])=>{
      const sx=bx-cx*.2;if(sx<-80||sx>W+80)return;
      ctx.fillStyle=`rgba(20,10,40,0.9)`;ctx.fillRect(sx,groundY-bh,bw,bh);
      for(let wy=groundY-bh+10;wy<groundY-10;wy+=16){
        for(let wx=sx+6;wx<sx+bw-6;wx+=12){
          if(Math.random()>.45){ctx.fillStyle='rgba(255,240,100,0.7)';ctx.fillRect(wx,wy,6,8);}
        }
      }
    });
  },
  _bgSunRays(cx,t,topColor){
    ctx.save();ctx.globalAlpha=0.12;
    for(let i=0;i<8;i++){
      const a=(i/8)*Math.PI+t*.05;
      ctx.fillStyle='#fff8e0';ctx.beginPath();ctx.moveTo(80,80);
      ctx.lineTo(80+Math.cos(a)*600,Math.sin(a)*400);
      ctx.lineTo(80+Math.cos(a+.08)*600,Math.sin(a+.08)*400);
      ctx.closePath();ctx.fill();
    }
    ctx.restore();
    ctx.save();ctx.shadowBlur=40;ctx.shadowColor='#ffcc44';
    ctx.fillStyle='#ffe066';ctx.beginPath();ctx.arc(80,80,30,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#fff5cc';ctx.beginPath();ctx.arc(80,80,18,0,Math.PI*2);ctx.fill();
    ctx.restore();
  },
  _bgBirds(cx,t){
    for(let i=0;i<5;i++){
      const bx=((i*200+t*20)%(W+100))-50;
      const by=60+i*25+Math.sin(t+i)*8;
      ctx.strokeStyle='#4a3000';ctx.lineWidth=1.5;ctx.beginPath();
      ctx.moveTo(bx,by);ctx.quadraticCurveTo(bx+6,by-4,bx+12,by);ctx.stroke();
      ctx.beginPath();ctx.moveTo(bx+12,by);ctx.quadraticCurveTo(bx+18,by-4,bx+24,by);ctx.stroke();
    }
  },
  _bgEmbers(cx,t){
    for(let i=0;i<30;i++){
      const ex=((i*173+t*15*(1+i*.03))%(W+100));
      const ey=H-(((i*79+t*20*(1+i*.05))%H));
      ctx.fillStyle=`rgba(${220+i%35},${40+i%60},0,${0.4+Math.sin(t+i)*0.3})`;
      ctx.beginPath();ctx.arc(ex,ey,1+Math.sin(t*2+i)*0.8,0,Math.PI*2);ctx.fill();
    }
  },
  _bgVolcanoes(cx,groundY){
    [[200,120],[600,160],[1100,140],[1600,180],[2200,150]].forEach(([vx,vh])=>{
      const sx=vx-cx*.3;if(sx<-200||sx>W+200)return;
      ctx.fillStyle='#3a1a0a';ctx.beginPath();ctx.moveTo(sx-vh*.6,groundY);ctx.lineTo(sx,groundY-vh);ctx.lineTo(sx+vh*.6,groundY);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ff4400';ctx.beginPath();ctx.moveTo(sx-15,groundY-vh+10);ctx.lineTo(sx,groundY-vh-20);ctx.lineTo(sx+15,groundY-vh+10);ctx.closePath();ctx.fill();
      ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(sx,groundY-vh-15,12,0,Math.PI*2);ctx.fill();
    });
  },
  _bgCherryTrees(cx,t,groundY){
    [100,320,580,850,1100,1400,1700,2000,2400,2800].forEach((tx,i)=>{
      const sx=tx-cx*.3;if(sx<-120||sx>W+120)return;
      ctx.fillStyle='#5d4037';ctx.fillRect(sx-5,groundY-80,10,80);
      ctx.fillRect(sx-3,groundY-120,6,50);
      const blossom=['#f48fb1','#f06292','#fce4ec','#ff80ab'];
      for(let b=0;b<20;b++){
        const ba=b*.38+t*.08;const br=30+b*2;
        const bx2=sx+Math.cos(ba)*br*.7;const by=groundY-110+Math.sin(ba)*br*.5;
        ctx.fillStyle=blossom[b%blossom.length];ctx.globalAlpha=0.8;
        ctx.beginPath();ctx.arc(bx2,by,8,0,Math.PI*2);ctx.fill();
      }
      ctx.globalAlpha=1;
    });
  },
  _bgPetals(cx,t){
    for(let i=0;i<20;i++){
      const px=((i*233+t*12*(1+i*.04))%(W+80))-40;
      const py=((i*97+t*8*(1+i*.03))%(this.groundY));
      ctx.save();ctx.globalAlpha=0.7;ctx.fillStyle='#f48fb1';
      ctx.translate(px,py);ctx.rotate(t+i);
      ctx.beginPath();ctx.ellipse(0,0,4,2,0,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  },
  _bgSunset(cx,t){
    // Horizontal streaks
    const sunset=['#ff6b35','#ff8c42','#ffd166','#ff5e5e'];
    for(let i=0;i<8;i++){
      ctx.fillStyle=sunset[i%sunset.length];ctx.globalAlpha=0.08+i*.012;
      ctx.fillRect(0,i*30,W,28);
    }
    ctx.globalAlpha=1;
    ctx.save();ctx.shadowBlur=60;ctx.shadowColor='#ff6600';
    ctx.fillStyle='#ff8800';ctx.beginPath();ctx.arc(W/2,this.groundY+10,55,Math.PI,0,true);ctx.fill();
    ctx.fillStyle='#ffcc00';ctx.beginPath();ctx.arc(W/2,this.groundY+10,35,Math.PI,0,true);ctx.fill();
    ctx.restore();
  },
  _bgNebula(cx,t){
    ctx.save();
    [[200,150,'#3a0070'],[500,200,'#002080'],[350,100,'#70003a'],[700,180,'#003070']].forEach(([nx,ny,nc])=>{
      const ng=ctx.createRadialGradient(nx,ny,0,nx,ny,120);
      ng.addColorStop(0,nc.replace(')',',0.4)').replace('rgb(','rgba('));
      ng.addColorStop(1,'transparent');
      ctx.fillStyle=ng;ctx.beginPath();ctx.arc(nx,ny,120,0,Math.PI*2);ctx.fill();
    });
    ctx.restore();
  },
  _bgAurora(cx,t){
    ctx.save();ctx.globalAlpha=0.18;
    for(let i=0;i<5;i++){
      const aw=ctx.createLinearGradient(0,0,0,200);
      aw.addColorStop(0,'transparent');aw.addColorStop(0.5,['#00ffcc','#00aaff','#aa00ff','#ff00aa','#00ffaa'][i]);aw.addColorStop(1,'transparent');
      ctx.fillStyle=aw;ctx.beginPath();
      for(let x=0;x<=W;x+=20){ctx.lineTo(x,80+Math.sin(x*.02+t+i)*50+i*20);}
      ctx.lineTo(W,0);ctx.lineTo(0,0);ctx.closePath();ctx.fill();
    }
    ctx.restore();
  },
  _bgCrystals(cx,t){
    [[80,300],[200,350],[450,280],[700,320],[1000,300],[1300,360]].forEach(([bx,by],i)=>{
      const sx=bx-cx*.2;if(sx<-60||sx>W+60)return;
      const h2=80+i*15;const w2=20+i*5;
      const grd=ctx.createLinearGradient(sx,by-h2,sx+w2,by);
      grd.addColorStop(0,['#e0c0ff','#c0e0ff','#ffe0f0','#c0ffe0'][i%4]);grd.addColorStop(1,'rgba(100,50,180,0.3)');
      ctx.fillStyle=grd;ctx.globalAlpha=0.6+Math.sin(t+i)*.15;
      ctx.beginPath();ctx.moveTo(sx,by);ctx.lineTo(sx-w2*.4,by-h2*.6);ctx.lineTo(sx+w2*.5,by-h2);ctx.lineTo(sx+w2,by-h2*.5);ctx.lineTo(sx+w2*.6,by);ctx.closePath();ctx.fill();
      ctx.globalAlpha=1;
    });
  },
  _bgMist(cx,t){
    ctx.save();
    for(let i=0;i<5;i++){
      const my=(this.groundY-40)+i*15;
      const mg=ctx.createLinearGradient(0,my-20,0,my+20);
      mg.addColorStop(0,'transparent');mg.addColorStop(0.5,'rgba(180,140,255,0.08)');mg.addColorStop(1,'transparent');
      ctx.fillStyle=mg;ctx.fillRect(0,my-20,W,40);
    }
    ctx.restore();
  },
  _bgNightGarden(cx,t,groundY){
    [[100,groundY-60],[250,groundY-80],[450,groundY-55],[700,groundY-70],[950,groundY-60]].forEach(([fx,fy],i)=>{
      const sx=fx-cx*.25;if(sx<-100||sx>W+100)return;
      // Glowing flower
      ctx.save();ctx.shadowBlur=20;ctx.shadowColor=['#ff80ab','#aa80ff','#80ffcc','#ffaa40','#80c0ff'][i%5];
      ctx.fillStyle=['#ff6090','#9060ff','#40ffaa','#ff9020','#60aaff'][i%5];
      ctx.globalAlpha=0.7+Math.sin(t+i)*.15;
      for(let p=0;p<6;p++){const pa=p*(Math.PI/3)+t*.3;ctx.beginPath();ctx.ellipse(sx+Math.cos(pa)*10,fy+Math.sin(pa)*10,6,4,pa,0,Math.PI*2);ctx.fill();}
      ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(sx,fy,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    });
  },
  _bgFireflies(cx,t){
    for(let i=0;i<15;i++){
      const fx=((i*237+t*6*(1+i*.05))%(W+40))-20;
      const fy=this.groundY-60-((i*113)%160);
      const alpha=0.3+Math.sin(t*2+i)*0.5;
      if(alpha<0.05)continue;
      ctx.save();ctx.shadowBlur=12;ctx.shadowColor='#aaff80';ctx.globalAlpha=alpha;
      ctx.fillStyle='#ccff88';ctx.beginPath();ctx.arc(fx,fy,2.5,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  },
  _bgRainbowAura(cx,t){
    const rainbow=['#ff004080','#ff800040','#ffff0030','#00ff4030','#0080ff40','#8000ff40'];
    for(let i=0;i<6;i++){
      const rg=ctx.createRadialGradient(W/2,H*.6,i*30,W/2,H*.6,i*80+100);
      rg.addColorStop(0,rainbow[i]);rg.addColorStop(1,'transparent');
      ctx.fillStyle=rg;ctx.globalAlpha=0.3+Math.sin(t+i)*.1;
      ctx.beginPath();ctx.arc(W/2,H*.6,i*80+100,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
  },
  _bgRoseBorder(cx,t,groundY){
    for(let i=0;i<8;i++){
      const rx=i*120-cx*.1;const ry=groundY-10;
      if(rx<-30||rx>W+30)continue;
      ctx.fillStyle='#2e7d32';ctx.fillRect(rx,ry-20,2,20);
      ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#ff4488';
      ctx.fillStyle='#e91e8c';ctx.beginPath();ctx.arc(rx,ry-22,7,0,Math.PI*2);ctx.fill();
      ctx.fillStyle='#ff80c0';ctx.beginPath();ctx.arc(rx-2,ry-24,4,0,Math.PI*2);ctx.fill();
      ctx.restore();
    }
  },

  drawPlatforms(){
    const lv=this.level;
    // Choose platform style per level
    const styleMap=[
      // lv0: grassy with flowers
      {main:'#4caf50',top:'#81c784',shadow:'#2e7d32',accent:'#a5d6a7',type:'grass'},
      // lv1: neon city blocks
      {main:'#1a1a3e',top:'#3a3a6e',shadow:'#0d0d20',accent:'#7b68ee',type:'neon'},
      // lv2: warm wood/stone
      {main:'#8d6e63',top:'#bcaaa4',shadow:'#5d4037',accent:'#d7ccc8',type:'wood'},
      // lv3: dark lava rock
      {main:'#4a1500',top:'#7c2d00',shadow:'#2d0a00',accent:'#ff4400',type:'lava'},
      // lv4: pink sakura stone
      {main:'#e91e8c',top:'#f48fb1',shadow:'#ad1457',accent:'#fce4ec',type:'sakura'},
      // lv5: orange sunset stone
      {main:'#bf360c',top:'#e64a19',shadow:'#7f0000',accent:'#ff8a65',type:'sunset'},
      // lv6: deep space crystal
      {main:'#4a148c',top:'#7b1fa2',shadow:'#1a0033',accent:'#ce93d8',type:'crystal'},
      // lv7: ice/glass
      {main:'#80d8ff',top:'#e1f5fe',shadow:'#006064',accent:'#fff',type:'ice'},
      // lv8: magical night stone
      {main:'#1a1040',top:'#312080',shadow:'#08041a',accent:'#aa80ff',type:'magic'},
      // lv9: golden royal
      {main:'#e65100',top:'#ff9800',shadow:'#bf360c',accent:'#ffe082',type:'golden'},
    ];
    const st=styleMap[lv]||styleMap[0];

    this.platforms.forEach(pl=>{
      const t=pl.type||'normal';
      // Shadow
      ctx.fillStyle='rgba(0,0,0,0.22)';ctx.fillRect(pl.x+4,pl.y+5,pl.w,24);

      if(st.type==='grass'||t==='normal'){
        // Grassy platform
        ctx.fillStyle=st.main;ctx.fillRect(pl.x,pl.y+6,pl.w,18);
        // Grass top with bumps
        ctx.fillStyle=st.top;
        for(let bx=pl.x;bx<pl.x+pl.w;bx+=8){
          ctx.beginPath();ctx.arc(bx+4,pl.y+6,4,Math.PI,0);ctx.fill();
        }
        ctx.fillStyle=st.shadow;ctx.fillRect(pl.x,pl.y+20,pl.w,4);
        // Flowers
        if(lv===0)for(let bx=pl.x+12;bx<pl.x+pl.w-8;bx+=22){ctx.fillStyle='#ff80ab';ctx.beginPath();ctx.arc(bx,pl.y+2,3,0,Math.PI*2);ctx.fill();}
      } else if(st.type==='neon'){
        ctx.fillStyle=st.main;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle=st.top;ctx.fillRect(pl.x,pl.y,pl.w,4);
        ctx.save();ctx.shadowBlur=8;ctx.shadowColor=st.accent;
        ctx.strokeStyle=st.accent;ctx.lineWidth=1.5;ctx.strokeRect(pl.x,pl.y,pl.w,24);
        ctx.restore();
      } else if(st.type==='wood'){
        ctx.fillStyle=st.main;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle=st.top;ctx.fillRect(pl.x,pl.y,pl.w,8);
        ctx.fillStyle=st.shadow;ctx.fillRect(pl.x,pl.y+20,pl.w,4);
        ctx.strokeStyle='rgba(0,0,0,0.15)';ctx.lineWidth=1;
        for(let bx=pl.x;bx<pl.x+pl.w;bx+=16)ctx.strokeRect(bx,pl.y,Math.min(16,pl.x+pl.w-bx),24);
      } else if(st.type==='lava'){
        ctx.fillStyle=st.main;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle=st.top;ctx.fillRect(pl.x,pl.y,pl.w,6);
        // Glowing cracks
        ctx.save();ctx.shadowBlur=6;ctx.shadowColor='#ff4400';
        ctx.strokeStyle=st.accent;ctx.lineWidth=1;
        for(let bx=pl.x+10;bx<pl.x+pl.w-5;bx+=15){ctx.beginPath();ctx.moveTo(bx,pl.y+8);ctx.lineTo(bx+4,pl.y+16);ctx.lineTo(bx+2,pl.y+22);ctx.stroke();}
        ctx.restore();
      } else if(st.type==='sakura'){
        const sg=ctx.createLinearGradient(pl.x,pl.y,pl.x+pl.w,pl.y+24);
        sg.addColorStop(0,st.top);sg.addColorStop(1,st.main);
        ctx.fillStyle=sg;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle='rgba(255,255,255,0.3)';ctx.fillRect(pl.x,pl.y,pl.w,5);
        ctx.save();ctx.shadowBlur=6;ctx.shadowColor='#ff80c0';
        ctx.strokeStyle='rgba(255,255,255,0.5)';ctx.lineWidth=1;ctx.strokeRect(pl.x,pl.y,pl.w,24);
        ctx.restore();
      } else if(st.type==='crystal'){
        const cg=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+24);
        cg.addColorStop(0,st.top);cg.addColorStop(1,st.main);
        ctx.fillStyle=cg;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.save();ctx.shadowBlur=10;ctx.shadowColor=st.accent;
        ctx.strokeStyle=st.accent;ctx.lineWidth=1;ctx.strokeRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle='rgba(255,255,255,0.2)';
        for(let bx=pl.x+5;bx<pl.x+pl.w-5;bx+=20){ctx.beginPath();ctx.moveTo(bx,pl.y);ctx.lineTo(bx+4,pl.y+24);ctx.lineWidth=2;ctx.strokeStyle='rgba(255,255,255,0.15)';ctx.stroke();}
        ctx.restore();
      } else if(st.type==='ice'){
        const ig=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+24);
        ig.addColorStop(0,'#e1f5fe');ig.addColorStop(1,'#80d8ff');
        ctx.fillStyle=ig;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle='rgba(255,255,255,0.6)';ctx.fillRect(pl.x,pl.y,pl.w,5);
        ctx.strokeStyle='rgba(0,150,200,0.3)';ctx.lineWidth=1;ctx.strokeRect(pl.x,pl.y,pl.w,24);
      } else if(st.type==='magic'){
        const mg=ctx.createLinearGradient(pl.x,pl.y,pl.x+pl.w,pl.y+24);
        mg.addColorStop(0,'#311890');mg.addColorStop(0.5,'#1a0d50');mg.addColorStop(1,'#311890');
        ctx.fillStyle=mg;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.save();ctx.shadowBlur=12;ctx.shadowColor='#aa80ff';
        ctx.strokeStyle='rgba(170,128,255,0.6)';ctx.lineWidth=1.5;ctx.strokeRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle='rgba(255,255,255,0.15)';ctx.fillRect(pl.x,pl.y,pl.w,4);
        ctx.restore();
      } else if(st.type==='golden'){
        const gg=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+24);
        gg.addColorStop(0,'#ffe082');gg.addColorStop(0.4,'#ff9800');gg.addColorStop(1,'#e65100');
        ctx.fillStyle=gg;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.save();ctx.shadowBlur=8;ctx.shadowColor='#ffd700';
        ctx.strokeStyle='#ffd700';ctx.lineWidth=1.5;ctx.strokeRect(pl.x,pl.y,pl.w,24);
        ctx.restore();
        ctx.fillStyle='rgba(255,255,255,0.35)';ctx.fillRect(pl.x,pl.y,pl.w,5);
      } else if(st.type==='sunset'){
        const sg2=ctx.createLinearGradient(pl.x,pl.y,pl.x,pl.y+24);
        sg2.addColorStop(0,st.top);sg2.addColorStop(1,st.main);
        ctx.fillStyle=sg2;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle='rgba(255,160,80,0.25)';ctx.fillRect(pl.x,pl.y,pl.w,6);
        ctx.fillStyle=st.shadow;ctx.fillRect(pl.x,pl.y+20,pl.w,4);
      } else {
        ctx.fillStyle=st.main;ctx.fillRect(pl.x,pl.y,pl.w,24);
        ctx.fillStyle=st.top;ctx.fillRect(pl.x,pl.y,pl.w,7);
        ctx.fillStyle=st.shadow;ctx.fillRect(pl.x,pl.y+20,pl.w,4);
      }
    });
  },

  drawCoins(){

    // Legs/boots
    const lo=p.onGround?Math.sin(p.anim)*4:0;
    ctx.fillStyle='#f8bbd9';ctx.fillRect(ox+8,oy+50,8,6+Math.abs(lo));ctx.fillRect(ox+17,oy+50,8,6-lo*.5);
    ctx.save();ctx.shadowBlur=4;ctx.shadowColor='#c0005a';
    ctx.fillStyle='#d81b60';ctx.beginPath();ctx.ellipse(ox+11,oy+56+Math.abs(lo),7.5,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#d81b60';ctx.beginPath();ctx.ellipse(ox+22,oy+56,7.5,4.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.fillStyle='rgba(255,255,255,0.3)';ctx.beginPath();ctx.ellipse(ox+9,oy+54+Math.abs(lo),3,1.5,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
  },

  drawParticles(){this.particles.forEach(p=>{ctx.globalAlpha=p.life/40;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.size,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;},

  drawHUD(){
    // Background bar with gradient
    const hg=ctx.createLinearGradient(0,0,0,38);hg.addColorStop(0,'rgba(0,0,0,0.7)');hg.addColorStop(1,'rgba(0,0,0,0.3)');
    ctx.fillStyle=hg;ctx.fillRect(0,0,W,38);
    ctx.fillStyle='rgba(255,100,180,0.3)';ctx.fillRect(0,37,W,1);
    // Lives
    ctx.font='bold 14px Nunito,sans-serif';let ls='';for(let i=0;i<this.lives;i++)ls+='❤';
    ctx.fillStyle='#ff6b6b';ctx.textAlign='left';ctx.fillText(ls,10,25);
    // Coins
    ctx.fillStyle='#ffd700';ctx.font='bold 13px Nunito,sans-serif';ctx.fillText(`✦ ${this.coins}`,70,25);
    // Level title
    ctx.fillStyle='rgba(255,255,255,0.9)';ctx.textAlign='center';ctx.font='bold 11px Nunito,sans-serif';ctx.fillText(LEVEL_TITLES_HUD[this.level],W/2,25);
    // Cards
    const got=this.cards_arr.filter(c=>c.collected).length;
    ctx.textAlign='right';ctx.fillStyle='#ff99cc';ctx.font='bold 12px Nunito,sans-serif';ctx.fillText(`✉ ${got}/4`,W-10,25);
  }
};

function rectsOverlap(a,b){return a.x<b.x+(b.w||28)&&a.x+(a.w||32)>b.x&&a.y<b.y+(b.h||32)&&a.y+(a.h||48)>b.y;}
function roundRect(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

G.init();
</script>
